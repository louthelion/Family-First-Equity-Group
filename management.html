<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Management Application — Family First Equity Group</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="wrap">

    <section class="card formCard">
      <div class="formHead">
        <div>
          <h2>Management Application</h2>
          <p>For property management requests. Complete the form and submit.</p>
        </div>
        <a class="back" href="index.html">← Back</a>
      </div>

      <form name="management" method="POST" action="thank-you.html">
        <input type="hidden" name="form_type" value="management"/>

        <div class="row">
          <label>You are applying as… <span class="req">*</span>
            <select name="client_role" required>
              <option value="">Select…</option>
              <option>Investor</option>
              <option>Personal (Individual)</option>
              <option>Company / Entity</option>
            </select>
          </label>

          <label>Property Category <span class="req">*</span>
            <select name="property_category" required>
              <option value="">Select…</option>
              <option>Residential</option>
              <option>Commercial Real Estate</option>
              <option>Multi-Family (5+ units)</option>
              <option>Land</option>
              <option>Other (we still help)</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Full Name <span class="req">*</span><input name="full_name" required></label>
          <label>Email <span class="req">*</span><input type="email" name="email" required></label>
        </div>

        <div class="row">
          <label>Phone <span class="req">*</span><input name="phone" required></label>
          <label>City / Area <span class="req">*</span><input name="city" required></label>
        </div>

        <div class="row">
          <label>Property Address <span class="req">*</span><input name="property_address" required></label>
          <label>Units / Doors <span class="req">*</span>
            <select name="units" required>
              <option value="">Select…</option>
              <option>1 unit</option>
              <option>2–4 units</option>
              <option>5–20 units</option>
              <option>21–100 units</option>
              <option>100+ units</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Currently Occupied? <span class="req">*</span>
            <select name="occupied" required>
              <option value="">Select…</option>
              <option>Yes</option>
              <option>No</option>
              <option>Partially</option>
            </select>
          </label>

          <label>Service Needed <span class="req">*</span>
            <select name="service" required>
              <option value="">Select…</option>
              <option>Full Management</option>
              <option>Tenant Placement Only</option>
              <option>Rent Collection / Admin Only</option>
              <option>Not sure yet</option>
            </select>
          </label>
        </div>

        <label>Details / Notes <span class="req">*</span>
          <textarea name="notes" required></textarea>
        </label>

        <button class="primary" type="submit">Submit Management Application</button>
      </form>
    </section>

  </div>
</body>
</html>
