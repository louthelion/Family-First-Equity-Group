<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Family First — Management</title>
<style>
/* Same styling as seller page */
body{margin:0;font-family:Arial;background:#000;color:#fff}
.wrap{max-width:760px;margin:0 auto;padding:22px}
.panel{padding:20px;border-radius:24px;border:2px solid gold}
h1{color:red;text-transform:uppercase}
.section{margin-top:14px;padding:14px;border:1px solid gold;border-radius:14px}
label{display:block;margin-top:12px}
input,select,textarea{width:100%;padding:10px;margin-top:6px;background:#111;color:#fff;border:1px solid gold;border-radius:8px}
textarea{min-height:100px}
button{margin-top:14px;padding:12px;width:100%;background:gold;color:#000;font-weight:900;border:none;border-radius:14px}
.hidden{display:none}
.bigThanks{font-size:24px;color:red;font-weight:900}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">

<h1>PROPERTY MANAGEMENT</h1>

<div class="section" id="chooseSection">
<button onclick="showForm('investor')">INVESTOR</button>
<button onclick="showForm('personal')">PERSONAL</button>
</div>

<div class="section hidden" id="investorSection">
<form id="manageInvestor" name="FFEG-MANAGE-INVESTOR" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="FFEG-MANAGE-INVESTOR">

<label>Company Name *</label>
<input required name="company">

<label>Email *</label>
<input type="email" required name="email">

<label>Phone *</label>
<input required name="phone">

<label>Property Type *</label>
<select required name="property_type">
<option>Commercial</option>
<option>Multifamily</option>
<option>Plaza</option>
<option>Mixed Use</option>
</select>

<label>Number of Units *</label>
<input required name="units">

<label>Current Occupancy % *</label>
<input required name="occupancy">

<label>Monthly Gross Income *</label>
<input required name="income">

<label>Main Management Issues *</label>
<textarea required name="issues"></textarea>

<button type="submit">SUBMIT</button>
</form>
</div>

<div class="section hidden" id="personalSection">
<form id="managePersonal" name="FFEG-MANAGE-PERSONAL" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="FFEG-MANAGE-PERSONAL">

<label>Full Name *</label>
<input required name="name">

<label>Email *</label>
<input type="email" required name="email">

<label>Phone *</label>
<input required name="phone">

<label>Property Address *</label>
<input required name="address">

<label>Type *</label>
<select required name="type">
<option>House</option>
<option>Duplex</option>
<option>Small Apartment</option>
</select>

<label>What do you need help with? *</label>
<textarea required name="needs"></textarea>

<button type="submit">SUBMIT</button>
</form>
</div>

<div class="section hidden" id="thankYouSection">
<div class="bigThanks">THANK YOU</div>
<p>We received your request. Our team will contact you shortly.</p>
</div>

</div>
</div>

<script>
function showForm(type){
document.getElementById('chooseSection').classList.add('hidden');
if(type==='investor'){
document.getElementById('investorSection').classList.remove('hidden');
}
if(type==='personal'){
document.getElementById('personalSection').classList.remove('hidden');
}
}
['manageInvestor','managePersonal'].forEach(id=>{
const form=document.getElementById(id);
if(form){
form.addEventListener('submit',function(e){
e.preventDefault();
const data=new FormData(form);
fetch("/",{
method:"POST",
headers:{ "Content-Type":"application/x-www-form-urlencoded" },
body:new URLSearchParams(data).toString()
}).then(()=>{
document.getElementById('investorSection').classList.add('hidden');
document.getElementById('personalSection').classList.add('hidden');
document.getElementById('thankYouSection').classList.remove('hidden');
});
});
}
});
</script>

</body>
</html>
