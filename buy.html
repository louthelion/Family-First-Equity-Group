<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Buyer Application — Family First Equity Group</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="wrap">

    <section class="card formCard">
      <div class="formHead">
        <div>
          <h2>Buyer Application</h2>
          <p>For buyers (personal, investor, or company). Complete the form and submit.</p>
        </div>
        <a class="back" href="index.html">← Back</a>
      </div>

      <form name="buyer" method="POST" action="thank-you.html">
        <input type="hidden" name="form_type" value="buyer"/>

        <div class="row">
          <label>You are applying as… <span class="req">*</span>
            <select name="client_role" required>
              <option value="">Select…</option>
              <option>Investor</option>
              <option>Personal (Individual)</option>
              <option>Company / Entity</option>
            </select>
          </label>

          <label>Property Category <span class="req">*</span>
            <select name="property_category" required>
              <option value="">Select…</option>
              <option>Residential</option>
              <option>Commercial Real Estate</option>
              <option>Multi-Family (5+ units)</option>
              <option>Land</option>
              <option>Other (we still help)</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Full Name <span class="req">*</span><input name="full_name" required></label>
          <label>Email <span class="req">*</span><input type="email" name="email" required></label>
        </div>

        <div class="row">
          <label>Phone <span class="req">*</span><input name="phone" required></label>
          <label>City / Area <span class="req">*</span><input name="city" required></label>
        </div>

        <div class="row">
          <label>Budget Range <span class="req">*</span><input name="budget" required placeholder="$250,000 - $350,000"></label>
          <label>Pre-Approved? <span class="req">*</span>
            <select name="preapproved" required>
              <option value="">Select…</option>
              <option>Yes</option>
              <option>No</option>
              <option>Not sure yet</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Property Type <span class="req">*</span>
            <select name="property_type" required>
              <option value="">Select…</option>
              <option>Single Family</option>
              <option>Townhome / Condo</option>
              <option>Multi-Family (2–4)</option>
              <option>Apartment Building (5+)</option>
              <option>Land</option>
              <option>Commercial</option>
            </select>
          </label>

          <label>Timeline to Buy <span class="req">*</span>
            <select name="timeline" required>
              <option value="">Select…</option>
              <option>ASAP (0–30 days)</option>
              <option>30–60 days</option>
              <option>60–90 days</option>
              <option>90+ days</option>
            </select>
          </label>
        </div>

        <label>Details / Notes <span class="req">*</span>
          <textarea name="notes" required></textarea>
        </label>

        <button class="primary" type="submit">Submit Buyer Application</button>
      </form>
    </section>

  </div>
</body>
</html>
