<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Seller Application — Family First Equity Group</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="wrap">

    <section class="card formCard">
      <div class="formHead">
        <div>
          <h2>Seller Application</h2>
          <p>For sellers (personal, investor, or company). Complete the form and submit.</p>
        </div>
        <a class="back" href="index.html">← Back</a>
      </div>

      <form
  name="seller"
  method="POST"
  action="/thank-you.html"
  data-netlify="true"
>
  <input type="hidden" name="form-name" value="seller" />
  <input type="hidden" name="form_type" value="seller_application" />
        <div class="row">
          <label>You are applying as… <span class="req">*</span>
            <select name="client_role" required>
              <option value="">Select…</option>
              <option>Investor</option>
              <option>Personal (Individual)</option>
              <option>Company / Entity</option>
            </select>
          </label>

          <label>Property Category <span class="req">*</span>
            <select name="property_category" required>
              <option value="">Select…</option>
              <option>Residential</option>
              <option>Commercial Real Estate</option>
              <option>Multi-Family (5+ units)</option>
              <option>Land</option>
              <option>Other (we still help)</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Full Name <span class="req">*</span><input name="full_name" required></label>
          <label>Email <span class="req">*</span><input type="email" name="email" required></label>
        </div>

        <div class="row">
          <label>Phone <span class="req">*</span><input name="phone" required></label>
          <label>City / Area <span class="req">*</span><input name="city" required></label>
        </div>

        <div class="row">
          <label>Property Address <span class="req">*</span><input name="property_address" required></label>
          <label>Property Type <span class="req">*</span>
            <select name="property_type" required>
              <option value="">Select…</option>
              <option>Single Family</option>
              <option>Townhome / Condo</option>
              <option>Multi-Family (2–4)</option>
              <option>Apartment Building (5+)</option>
              <option>Land</option>
              <option>Commercial</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label>Price Target (if known) <span class="req">*</span><input name="price_target" required placeholder="$"></label>
          <label>Timeline to Sell <span class="req">*</span>
            <select name="timeline" required>
              <option value="">Select…</option>
              <option>ASAP (0–30 days)</option>
              <option>30–60 days</option>
              <option>60–90 days</option>
              <option>90+ days</option>
            </select>
          </label>
        </div>

        <label>Details / Notes <span class="req">*</span>
          <textarea name="notes" required></textarea>
        </label>

        <button class="primary" type="submit">Submit Application</button>
</form>
</div>

<div id="thanks" style="display:none;">
  <h2>Thank You</h2>
  <p>Your seller application has been received successfully.</p>
  <p>A Family First representative will review your submission and follow up with you soon.</p>
</div>

</section>
</div>
</body>
</html>
